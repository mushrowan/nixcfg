name = "nixcfg"
version = "0.3.0"
description = "JSON Schema builder for nixcfg"
licences = ["MIT", "Apache-2.0"]
target = "erlang"

# hide demo modules from published docs; they still compile and run locally
internal_modules = ["example_mycel"]

[dependencies]
gleam_stdlib = ">= 0.60.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
